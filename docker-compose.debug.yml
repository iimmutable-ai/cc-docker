# =============================================================================
# Docker Compose Debug Override — Debugger Support
#
# Adds SYS_PTRACE capability and unconfined seccomp profile for debugging
# tools like delve (Go), lldb, gdb, strace, etc.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.debug.yml up -d
#   Or via Makefile: make DEBUG=true up
# =============================================================================

services:
  cc-docker:
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

  cc-docker-solana:
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

  cc-docker-mobile:
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
