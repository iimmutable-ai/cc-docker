# =============================================================================
# Docker Compose — Docker Claude Development Environment (Security Hardened)
#
# SECURITY NOTES:
#   - Docker socket is NOT mounted by default (prevents host compromise)
#   - Ports bound to 127.0.0.1 only (not exposed to local network)
#   - Default Docker seccomp profile (not unconfined)
#   - No extra capabilities by default (SYS_PTRACE available via debug override)
#   - To enable DinD: use docker-compose.dind.yml override
#   - To enable debugging: use docker-compose.debug.yml override
#
# Usage:
#   Core only:       docker compose up -d
#   With DinD:       docker compose -f docker-compose.yml -f docker-compose.dind.yml up -d
#   With Debug:      docker compose -f docker-compose.yml -f docker-compose.debug.yml up -d
#   With Solana:     docker compose --profile solana up -d
#   With Mobile:     docker compose --profile mobile up -d
#   Slim build:      docker compose build --build-arg INCLUDE_DOTNET=false
#   GPU build:       docker compose build --build-arg INCLUDE_GPU=true
# =============================================================================

services:
  # ===========================================================================
  # Core Development Environment (always available)
  # ===========================================================================
  cc-docker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INCLUDE_NODE: "true"
        INCLUDE_DOTNET: "true"
        INCLUDE_GOLANG: "true"
        INCLUDE_RUST: "true"
        INCLUDE_BROWSER: "true"
        INCLUDE_GPU: "false"
        DEV_UID: "1000"
        DEV_GID: "1000"
        DEV_USER: "${DEV_USER:-dev}"
    image: ${COMPOSE_PROJECT_NAME:-cc-docker}:latest
    # container_name and hostname removed - Docker Compose auto-generates from project name
    # Result: ${COMPOSE_PROJECT_NAME}-cc-docker-1
    stdin_open: true
    tty: true
    restart: unless-stopped

    # -- Environment --
    environment:
      - HOME=/home/${DEV_USER:-dev}  # Override host HOME that Docker passes through
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - DEV_USER=${DEV_USER:-dev}
      # NVM
      - NVM_DIR=/usr/local/nvm
      # Go
      - GOPATH=/home/${DEV_USER:-dev}/go
      - GOROOT=/usr/local/go
      # .NET (only active when INCLUDE_DOTNET=true)
      - DOTNET_ROOT=/usr/local/dotnet
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      # Rust
      - RUSTUP_HOME=/usr/local/rustup
      - CARGO_HOME=/usr/local/cargo

    # -- Volumes --
    volumes:
      # Project code + dependencies (named volume, fully virtualized)
      - vol-projects:/workspace
      # User home persistence (auth, config, Go workspace, SSH)
      - vol-home:/home/${DEV_USER:-dev}
      # SECURITY: Docker socket NOT mounted by default
      # To enable DinD, use: docker compose -f docker-compose.yml -f docker-compose.dind.yml up -d
      # Claude Code user settings (global defaults — symlinked by entrypoint)
      - ./config/claude-settings.json:/etc/claude-code/settings.json:ro
      # Claude Code local marketplace (host folder, read-only)
      - ${CLAUDE_MARKETPLACE_PATH:-./marketplace}:/etc/claude-code/marketplace:ro
      # SSH agent forwarding (Mac/Linux)
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
      # Git config (read-only from host)
      - ${HOME:-~}/.gitconfig:/home/${DEV_USER:-dev}/.gitconfig:ro

    # -- SSH agent --
    env_file:
      - .env

    # -- Ports (bound to localhost only) --
    # Port format: ${PORT_BASE}xxx where xxx is container port suffix
    # Default PORT_BASE=41 → 41xxx, use PORT_BASE=42 for second instance
    ports:
      - "127.0.0.1:${PORT_BASE:-41}300:3000"     # React / Express
      - "127.0.0.1:${PORT_BASE:-41}500:5000"     # ASP.NET HTTP (only active when INCLUDE_DOTNET=true)
      - "127.0.0.1:${PORT_BASE:-41}501:5001"     # ASP.NET HTTPS (only active when INCLUDE_DOTNET=true)
      - "127.0.0.1:${PORT_BASE:-41}517:5173"     # Vite
      - "127.0.0.1:${PORT_BASE:-41}808:8080"     # Go / Generic
      - "127.0.0.1:${PORT_BASE:-41}881:8081"     # Vue / Metro
      - "127.0.0.1:${PORT_BASE:-41}608:6080"     # noVNC web interface (visual browser)

    # -- Resource limits --
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"
        reservations:
          memory: 2G
          cpus: "1"

    # -- Security --
    # SECURITY: Using Docker default seccomp profile (not unconfined)
    # SECURITY: No extra capabilities by default
    # To enable SYS_PTRACE for debuggers, use docker-compose.debug.yml override

  # ===========================================================================
  # Solana Development (optional profile)
  # ===========================================================================
  cc-docker-solana:
    build:
      context: .
      dockerfile: Dockerfile.solana
      args:
        BASE_IMAGE: cc-docker:latest
    image: ${COMPOSE_PROJECT_NAME:-cc-docker}-solana:latest
    # container_name and hostname removed - Docker Compose auto-generates from project name
    profiles:
      - solana
    stdin_open: true
    tty: true
    restart: unless-stopped

    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
      - TERM=xterm-256color
      - NVM_DIR=/usr/local/nvm

    volumes:
      - vol-projects:/workspace
      - vol-home:/home/${DEV_USER:-dev}
      # SECURITY: Docker socket NOT mounted by default
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent

    ports:
      - "127.0.0.1:${PORT_BASE:-41}889:8899"     # Solana local validator RPC
      - "127.0.0.1:${PORT_BASE:-41}890:8900"     # Solana local validator WebSocket

    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"

  # ===========================================================================
  # Mobile Development (optional profile)
  # ===========================================================================
  cc-docker-mobile:
    build:
      context: .
      dockerfile: Dockerfile.mobile
      args:
        BASE_IMAGE: cc-docker:latest
    image: ${COMPOSE_PROJECT_NAME:-cc-docker}-mobile:latest
    # container_name and hostname removed - Docker Compose auto-generates from project name
    profiles:
      - mobile
    stdin_open: true
    tty: true
    restart: unless-stopped

    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-}
      - TERM=xterm-256color
      - NVM_DIR=/usr/local/nvm
      - ANDROID_HOME=/opt/android-sdk
      - ANDROID_SDK_ROOT=/opt/android-sdk
      - FLUTTER_HOME=/opt/flutter
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

    volumes:
      - vol-projects:/workspace
      - vol-home:/home/${DEV_USER:-dev}
      # SECURITY: Docker socket NOT mounted by default
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent

    ports:
      - "127.0.0.1:${PORT_BASE:-41}900:19000"   # Expo
      - "127.0.0.1:${PORT_BASE:-41}901:19001"   # Expo DevTools
      - "127.0.0.1:${PORT_BASE:-41}554:5554"     # Android emulator
      - "127.0.0.1:${PORT_BASE:-41}555:5555"     # Android ADB

    deploy:
      resources:
        limits:
          memory: 12G
          cpus: "4"

# =============================================================================
# Volumes
# =============================================================================
# Volume names are automatically prefixed by COMPOSE_PROJECT_NAME
# Example: COMPOSE_PROJECT_NAME=trial-claude → trial-claude_vol-projects
volumes:
  vol-projects:
    # name directive removed - Docker Compose prefixes with project name
    driver: local

  vol-home:
    # name directive removed - Docker Compose prefixes with project name
    driver: local
